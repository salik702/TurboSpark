id = "turbospark"
name = "TURBO SPARK"
version = "0.1.0"
schema_version = 1
authors = ["TURBO SPARK Contributors"]
description = "TURBO SPARK Agent Server Extension for Zed"
repository = "https://github.com/turbospark/turbospark"

[agent_servers.turbospark]
name = "TURBO SPARK"
icon = "turbospark.svg"

[agent_servers.turbospark.targets.darwin-aarch64]
archive = "https://registry.npmjs.org/@turbospark/turbospark/-/turbospark-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

[agent_servers.turbospark.targets.darwin-x86_64]
archive = "https://registry.npmjs.org/@turbospark/turbospark/-/turbospark-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

[agent_servers.turbospark.targets.linux-x86_64]
archive = "https://registry.npmjs.org/@turbospark/turbospark/-/turbospark-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

[agent_servers.turbospark.targets.windows-x86_64]
archive = "https://registry.npmjs.org/@turbospark/turbospark/-/turbospark-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

